name: End-To-End Testing

on:
  repository_dispatch:
    types: [mantle2-update, cloud-update]
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout crust
        uses: actions/checkout@v6
        with:
          path: crust
      - name: Checkout mantle2
        uses: actions/checkout@v6
        with:
          repository: earth-app/mantle2
          path: mantle2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout cloud
        uses: actions/checkout@v6
        with:
          repository: earth-app/cloud
          path: cloud
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, curl, mbstring, dom, intl, gd, pdo_mysql
          coverage: none
          tools: composer:v2
      - name: Install ddev
        run: |
          curl -fsSL https://apt.fury.io/drud/gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/ddev.gpg
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/ddev.gpg] https://apt.fury.io/drud/ * *" | sudo tee /etc/apt/sources.list.d/ddev.list
          sudo apt-get update
          sudo apt-get install -y ddev
      - name: Generate Docker Cache Key
        id: docker_cache_key
        run: |
          ddev_ver=$(ddev --version 2>/dev/null | head -n1)
          startup_sha=$(sha1sum mantle2/startup.sh 2>/dev/null | awk '{print $1}')
          # Include any committed docker-compose / Dockerfile files to future-proof
          extra=$(find mantle2 cloud -type f \( -name 'docker-compose*.yml' -o -name 'Dockerfile*' \) 2>/dev/null \
                  | sort | xargs -r cat | sha1sum | awk '{print $1}')
          key=$(printf '%s|%s|%s' "$ddev_ver" "$startup_sha" "$extra" | sha1sum | awk '{print $1}')
          echo "key=${key}" >> "$GITHUB_OUTPUT"
          echo "ddev: $ddev_ver"
          echo "startup.sh sha: $startup_sha"
          echo "extra files sha: $extra"
          echo "composite cache key: $key"
      - name: Load Docker Cache
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: docker-${{ runner.os }}-${{ steps.docker_cache_key.outputs.key }}
      - name: Boot earth-app/mantle2
        run: |
          cd mantle2
          bash startup.sh 2>&1 | tee /tmp/mantle2.log
      - name: Boot earth-app/cloud
        run: |
          cd cloud
          bun install --frozen-lockfile
          bun run dev > /tmp/cloud.log 2>&1 &
          echo $! > /tmp/cloud.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9898/; then
              echo "cloud is up"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:9898/ || (cat /tmp/cloud.log && exit 1)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ADMIN_API_KEY: test-admin-key
          MANTLE_URL: http://127.0.0.1:8787
      - name: Install Crust dependencies
        run: |
          cd crust
          bun add -g husky
          bun install --frozen-lockfile
          bun run postinstall
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Playwright Browsers
        run: |
          cd crust
          bunx playwright install --with-deps chromium
      - name: Build production test bundle
        run: |
          cd crust
          bun run build:test
      - name: Run E2E tests with Coverage
        run: |
          cd crust
          COVERAGE=1 bun run test:e2e:integration
        env:
          CI: true
          PLAYWRIGHT_PROD: '1'
          MOCK_DISABLED: '1'
          COVERAGE: '1'
      - name: Upload Playwright Artifacts (Failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-e2e
          path: |
            crust/playwright-report/
            crust/playwright-results/
            /tmp/mantle2.log
            /tmp/cloud.log
          retention-days: 14
      - name: Upload to Codecov
        if: ${{ always() && hashFiles('crust/coverage/lcov.info') != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: earth-app/crust
          fail_ci_if_error: false
          flags: e2e-integration
          files: |
            crust/coverage/lcov.info
            crust/coverage/coverage-final.json
      - name: Tear-Down Servers
        if: always()
        run: |
          # mantle2 is daemonized by ddev (no PID file). cloud was launched
          # in the background by the Boot step and recorded its PID.
          if [ -f /tmp/cloud.pid ]; then kill "$(cat /tmp/cloud.pid)" || true; fi
          if command -v ddev >/dev/null; then
            (cd /tmp/drupal-mantle2 && ddev stop) || true
          fi

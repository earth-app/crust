name: Build Project
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install Husky
        run: bun add -g husky
      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          bun run postinstall
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: bun run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Archive Build Artifacts
        if: ${{ !cancelled() }}
        id: archive
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ github.run_id }}
          path: .output/
          overwrite: true
          include-hidden-files: true
          retention-days: 14
      - name: Attest Build Artifacts
        if: ${{ !cancelled()}}
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: crust-build-${{ github.run_id }}
          subject-digest: sha256:${{ steps.archive.outputs.artifact-digest }}

  test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60

    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install Husky
        run: bun add -g husky
      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          bun run postinstall
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Typecheck
        run: bun run typecheck
      - name: Build Test Build
        run: bun run build:test
      - name: Run E2E tests with Coverage
        run: bun run test:e2e:coverage
        env:
          CI: true
          COVERAGE: '1'
          PLAYWRIGHT_PROD: '1'
      - name: Upload Playwright Artifacts (Failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            playwright-results/
            .coverage/
          retention-days: 7
      - name: Upload to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: earth-app/crust
          fail_ci_if_error: false
          flags: e2e-mocked
          files: |
            coverage/lcov.info
            coverage/coverage-final.json
      - name: Archive Coverage Artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-artifacts-${{ github.run_id }}
          path: coverage/
          retention-days: 14

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/master' }}

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install Husky
        run: bun add -g husky
      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          bun run postinstall
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Version with Hash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${VERSION}-${GITHUB_SHA::7}"
          npm version $NEW_VERSION --no-git-tag-version
          echo "Publishing version: $NEW_VERSION"
      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
